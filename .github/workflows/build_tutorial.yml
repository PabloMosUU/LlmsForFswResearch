name: Build tutorial handouts

on:
  workflow_dispatch:
    inputs:
      department:
        description: "Which tutorial to build"
        required: true
        type: choice
        options:
          - kp
          - test
          - all
        default: all

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Validate merged tutorial configs
        run: python scripts/build_tutorial.py --department all --validate-only

      - name: Build selected tutorial
        run: python scripts/build_tutorial.py --department "${{ inputs.department }}" --render

      - name: Show generated files
        run: find tutorials -type f -maxdepth 3 | sort

      - name: Upload generated tutorials
        uses: actions/upload-artifact@v7
        with:
          name: tutorial-handouts-${{ inputs.department }}
          path: tutorials/
          if-no-files-found: error
          retention-days: 14
