duration: "1 hour"

example_1:
  title: "Extract information from text"
  scenario: "You have a short piece of source text and want to extract relevant information without adding unsupported claims."
  prompt: |-
    Extract the key information from the text below.

    [INSERT SOURCE TEXT HERE]

    Provide:
    1. The main claim or issue in one sentence.
    2. The most relevant details, using bullet points.
    3. Any uncertainty, ambiguity, or missing context.
    4. A short list of claims that would need manual verification.

    Stay close to the source text. Do not add facts, explanations, or assumptions that are not supported by the text. When possible, quote the exact words that support your answer.
  task: "Use the BRAVE(R) framework to analyze the prompt, then use the FACTS framework to analyze the response. Discuss your evaluation with a classmate."
  reflection: |-
    1. Did the model stay close to the source text?
    2. Did it provide evidence for its claims?
    3. Did it add anything that was not in the text?
    4. What would need manual checking?

example_2:
  title: "Code, annotate or classify text"
  scenario: "You need to code open-ended responses, interview excerpts, documents, or other textual data."
  prompt: |-
    Classify the following text using the codebook below.

    Text:
    [INSERT TEXT HERE]

    Codebook:
    - Category A: [INSERT DEFINITION]
    - Category B: [INSERT DEFINITION]
    - Category C: [INSERT DEFINITION]
    - Ambiguous or insufficient evidence: use this when the text does not clearly fit one category.

    Provide:
    1. The selected category.
    2. A confidence rating: high, medium, or low.
    3. The words or phrases that support the classification.
    4. A brief explanation of the decision.
    5. Any ambiguity or alternative interpretation.

    Do not force a category when the evidence is weak. Use the ambiguous or insufficient-evidence category when appropriate.
  task: "Use the FACTS framework to analyze the response. Discuss your evaluation with a classmate."
  reflection: |-
    1. Did the coding or classification seem justified?
    2. Were ambiguous cases marked as ambiguous?
    3. Did the model force categories where the evidence was weak?
    4. How would you revise the prompt or codebook?

example_3:
  title: "Summarize or compare research"
  scenario: "You need to quickly understand the main contribution, evidence, and limitations of a research text."
  prompt: |-
    Summarize the research abstract below in 3 bullet points.

    [INSERT ABSTRACT TEXT HERE]

    Provide:
    1. The main research question and method.
    2. The key findings.
    3. The main limitations and implications for future research.

    Focus on information that would help a researcher decide whether to read the full paper. Use only information from the abstract. Do not invent details about the study, sample, results, or implications.
  task: "Use the FACTS framework to analyze the response. Discuss your evaluation with a classmate."
  reflection: |-
    1. Did the model only use information from the provided text?
    2. Did it separate findings, limitations, and implications?
    3. Did it overstate what can be concluded?
    4. Would this help you decide whether to read the full source?

exercise_1:
  title: "Identifying hallucinations"
  task: |-
    Ask a model the following question:

    What are the latest studies on virtual reality therapy for PTSD published in 2026?

    Then check the answer against reliable external sources.
  reflection: |-
    1. Do these studies actually exist? Look up the titles in a search engine or academic database.
    2. Are the journal names correct?
    3. Do the author names match real researchers in the field?
    4. Does the model make confident claims without enough evidence?

    Document any fabricated or unverifiable information.

    Note: HuggingChat is often open about missing information. If you do not see any hallucinations, you may compare the result with another, commercial model.

exercise_2:
  title: "Bias detection"
  task: |-
    Compare responses to these two prompts:

    Prompt A: Describe the typical profile of someone with depression.

    Prompt B: Describe how depression manifests across different cultures and genders.

    Pay attention to what the model treats as normal, typical, or universal.
  reflection: |-
    1. What differences do you notice between the two responses?
    2. What assumptions does the model make?
    3. Does the model present one group, context, or experience as the default?
    4. How could the prompt be revised to reduce stereotyping or overgeneralization?
